# ============================================
# EcoHarvest Application Properties
# Purpose: Configures database connection, JPA, and server settings
# ============================================

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/Ecoharvest
spring.datasource.username=root
spring.datasource.password=Mohit27##
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
# update = auto-create/update tables based on entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8081
